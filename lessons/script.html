<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>script</title>
    <link href="../output.css" rel="stylesheet">
</head>

<body>
    <header class="gbutton" id="header">Hello</header>
    <h1>variables</h1>
    <p id="p1"></p>
    <p id="p2"></p>
    <hr>

    <h1>user input</h1>
    <label>username: </label>
    <input class="my-7 border-blue-300 border border-dashed" id="myText">
    <br>
    <button id="mySubmit">submit</button>
    <hr>
    <h1>type conversion</h1>
    <p id="type0"></p>
    <hr>
    <h1>counter program</h1>
    <label class="block flexy text-9xl" id="countLabel">0</label>
    <br>
    <div id="buttonContainer" class="space-x-5 flexy">
        <button id="decreaseBtn" class="btn btn1">decrease</button>
        <button id="resetBtn" class="btn btn1">reset</button>
        <button id="increaseBtn" class="btn btn1">increase</button>
    </div>
    <hr>
    <h1>random program</h1>
    <label class="block flexy text-9xl" id="randomLabel">0</label>
    <br>
    <div class="flexy">
        <button class="btn btn1" id="randomButton">roll</button>
    </div>
    <hr>
    <h1 class="inline">if statements</h1>
    <p class="inline" id="ifLabel"></p>
    <br>
    <label>Enter your age:</label>
    <input class="my-7 border-blue-300 border border-dashed" id="ifInput">
    <br>
    <button class="" id="ifSubmit">submit</button>
    <hr>

    <script src="script.js"></script>
</body>

</html>
